name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 8 * * *"   # daily 08:00 UTC - live "is the Skill still working?" check
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Live regime smoke test (real Kraken OHLC)
        run: npx tsx scripts/smoke.ts XBTUSD ETHUSD SOLUSD
